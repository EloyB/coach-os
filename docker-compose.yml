services:
  postgres:
    image: postgres:17
    container_name: coachos_postgres
    environment:
      POSTGRES_DB: coachos_dev
      POSTGRES_USER: coachos
      POSTGRES_PASSWORD: coachos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachos -d coachos_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: coachos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@coachos.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
